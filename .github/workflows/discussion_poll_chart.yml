name: discussion-poll-chart

on:
  workflow_dispatch:
    inputs:
      discussion_number:
        description: "Discussion number"
        type: number
        default: 68
  schedule:
    - cron: "*/5 * * * *"

permissions:
  discussions: write
  contents: read

jobs:
  update-poll-chart:
    if: github.repository == 'June6699/dart_simple_live'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update discussion poll chart comment
        env:
          GITHUB_TOKEN: ${{ secrets.DISCUSSION_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          REPO_OWNER: June6699
          REPO_NAME: dart_simple_live
          DISCUSSION_NUMBER: ${{ github.event.inputs.discussion_number || 68 }}
          OUTPUT_PATH: poll-comment.md
        run: node .github/scripts/update-discussion-poll-chart.js
